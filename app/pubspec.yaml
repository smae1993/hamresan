name: hamresan
description: "همرسان — اشتراک محتوا روی شبکه‌ی محلی"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  flutter_svg: ^2.0.17
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  crypto: ^3.0.6
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/vazirmatn/Vazirmatn-Thin.ttf
          weight: 100
        - asset: assets/fonts/vazirmatn/Vazirmatn-Light.ttf
          weight: 300
        - asset: assets/fonts/vazirmatn/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/vazirmatn/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/vazirmatn/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/vazirmatn/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/vazirmatn/Vazirmatn-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/vazirmatn/Vazirmatn-Black.ttf
          weight: 900
